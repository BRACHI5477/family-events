<!doctype html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ОЎОЋОъОЪ ОљОЎОеОЋОбОЎОЮ ОъОЕОцОЌОфОЎ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>­ЪЊЁ</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- ОъОАОџ ОћОфОЌОЉОеОЋОф -->
  <div id="login-screen" class="login-screen hidden">
    <form id="login-form" class="login-card">
      <div class="login-logo" id="login-logo">­ЪЉеРђЇ­ЪЉЕРђЇ­ЪЉДРђЇ­ЪЉд</div>
      <h1 id="login-title">ОЎОЋОъОЪ ОљОЎОеОЋОбОЎОЮ ОъОЕОцОЌОфОЎ</h1>
      <p class="login-sub">ОћОфОЌОЉОеОЋОф ОюОъОбОеОЏОф</p>
      <label>ОЕОЮ ОъОЕОфОъОЕ<input type="text" id="login-username" autocomplete="username" required></label>
      <label>ОАОЎОАОъОћ<input type="password" id="login-password" autocomplete="current-password" required></label>
      <div class="login-error" id="login-error"></div>
      <button type="submit" class="btn btn-primary btn-block">ОЏОаОЎОАОћ</button>
      <div class="login-links">
        <a href="#" id="link-forgot">ОЕОЏОЌОфОЎ ОАОЎОАОъОћ</a>
        &nbsp;┬и&nbsp;
        <a href="#" id="link-request">ОЉОДОЕОф ОњОЎОЕОћ ОюОдОцОЎОЎОћ</a>
      </div>
    </form>
  </div>

  <!-- ОљОцОюОЎОДОдОЎОћ ОеОљОЕОЎОф -->
  <div id="app" class="app hidden">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-logo" id="brand-logo">­ЪЉеРђЇ­ЪЉЕРђЇ­ЪЉДРђЇ­ЪЉд</span>
        <span class="brand-name" id="brand-name">ОЎОЋОъОЪ ОљОЎОеОЋОбОЎОЮ</span>
      </div>
      <nav id="nav" class="nav"></nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="theme-toggle" title="ОъОдОЉ ОЏОћОћ/ОЉОћОЎОе">­ЪїЎ</button>
        <button class="btn btn-ghost" id="btn-logout">ОЎОдОЎОљОћ</button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button class="menu-btn" id="menu-btn" aria-label="ОфОцОеОЎОў">Рў░</button>
        <h2 id="page-title">ОъОАОџ ОћОЉОЎОф</h2>
        <div class="topbar-right" id="topbar-right">
          <span class="user-chip" id="user-chip"></span>
        </div>
      </header>
      <main id="view" class="view"></main>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
  </div>

  <!-- ОъОЋОЊОю ОЏОюОюОЎ -->
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root"></div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/hebrew.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/members.js"></script>
  <script src="js/modules/events.js"></script>
  <script src="js/modules/reminders.js"></script>
  <script src="js/modules/templates.js"></script>
  <script src="js/modules/reports.js"></script>
  <script src="js/modules/families.js"></script>
  <script src="js/modules/users.js"></script>
  <script src="js/modules/settings.js"></script>
  <script src="js/modules/activity.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
